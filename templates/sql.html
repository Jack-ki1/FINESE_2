{% extends "base.html" %}
{% block content %}
<div id="sqlContent">
    <div class="alert alert-info" id="noDataAlert">Load a dataset to start querying.</div>
    
    <div id="sqlDashboard" style="display:none;" class="animate-fade-in">
        <!-- Query Builder & Editor -->
        <div class="card mb-4">
            <div class="card-header">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="16 18 22 12 16 6"/>
                    <polyline points="8 6 2 12 8 18"/>
                </svg>
                SQL Query Editor
            </div>
            <div class="card-body">
                <!-- Schema Explorer -->
                <div class="mb-3">
                    <label class="form-label">Table Schema</label>
                    <div id="schemaExplorer" class="p-3" style="background: var(--bg-secondary); border-radius: 8px; max-height: 150px; overflow-y: auto;">
                        <div class="text-muted">Loading schema...</div>
                    </div>
                </div>
                
                <!-- Quick Query Templates -->
                <div class="mb-3">
                    <label class="form-label">Quick Queries</label>
                    <div class="d-flex gap-2 flex-wrap">
                        <button class="btn btn-sm btn-secondary" onclick="loadTemplate('select_all')">SELECT *</button>
                        <button class="btn btn-sm btn-secondary" onclick="loadTemplate('count')">COUNT</button>
                        <button class="btn btn-sm btn-secondary" onclick="loadTemplate('group_by')">GROUP BY</button>
                        <button class="btn btn-sm btn-secondary" onclick="loadTemplate('filter')">WHERE Filter</button>
                        <button class="btn btn-sm btn-secondary" onclick="loadTemplate('top_n')">TOP N</button>
                        <button class="btn btn-sm btn-secondary" onclick="loadTemplate('distinct')">DISTINCT</button>
                    </div>
                </div>
                
                <!-- SQL Editor -->
                <textarea class="form-control" id="sqlEditor" rows="6" placeholder="SELECT * FROM df LIMIT 10" 
                          style="font-family: 'JetBrains Mono', monospace; font-size: 13px;"></textarea>
                
                <div class="d-flex gap-2 mt-3">
                    <button class="btn btn-primary" onclick="executeQuery()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                        </svg>
                        Execute Query
                    </button>
                    <button class="btn btn-success" onclick="visualizeResults()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 3v18h18"/>
                            <path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/>
                        </svg>
                        Visualize Results
                    </button>
                    <button class="btn btn-secondary" onclick="exportResults()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        Export CSV
                    </button>
                    <button class="btn btn-ghost" onclick="clearEditor()">Clear</button>
                </div>
            </div>
        </div>
        
        <!-- Query History -->
        <div class="card mb-4">
            <div class="card-header">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
                Query History
            </div>
            <div class="card-body p-0">
                <div id="queryHistory" style="max-height: 200px; overflow-y: auto;">
                    <div class="empty-state py-4">
                        <p class="text-muted">No queries executed yet</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Results Section -->
        <div class="card" id="resultsCard" style="display:none;">
            <div class="card-header">
                <span id="resultInfo">Query Results</span>
                <span class="badge badge-success" id="rowCount"></span>
            </div>
            <div class="card-body p-0">
                <div id="resultsGrid" class="ag-theme-alpine" style="height: 400px;"></div>
            </div>
        </div>
        
        <!-- Visualization -->
        <div class="card mt-4" id="vizCard" style="display:none;">
            <div class="card-header">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 3v18h18"/>
                    <path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/>
                </svg>
                Visualization
            </div>
            <div class="card-body p-0">
                <div id="vizChart" style="height: 400px;"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<script>
let queryHistory = [];
let lastResults = null;

document.addEventListener('DOMContentLoaded', () => { 
    loadDatasetInfo(); 
    checkAndLoadSchema(); 
});

async function checkAndLoadSchema() {
    const infoRes = await fetch('/api/data/info');
    const infoData = await infoRes.json();
    
    if (!infoData.loaded) {
        document.getElementById('noDataAlert').style.display = 'block';
        document.getElementById('sqlDashboard').style.display = 'none';
        return;
    }
    
    const res = await fetch('/review/api/profile');
    const data = await res.json();
    
    // Build schema explorer
    const schemaHTML = Object.entries(data.dtypes).map(([col, dtype]) => `
        <div style="padding: 4px 0; border-bottom: 1px solid var(--border-subtle);">
            <strong>${col}</strong> <span class="badge badge-secondary">${dtype}</span>
        </div>
    `).join('');
    
    document.getElementById('schemaExplorer').innerHTML = schemaHTML;
    
    // Set default query
    document.getElementById('sqlEditor').value = 'SELECT * FROM df LIMIT 10';
    
    document.getElementById('noDataAlert').style.display = 'none';
    document.getElementById('sqlDashboard').style.display = 'block';
}

function loadTemplate(template) {
    const templates = {
        select_all: 'SELECT * FROM df',
        count: 'SELECT COUNT(*) as total_rows FROM df',
        group_by: 'SELECT column_name, COUNT(*) as count\nFROM df\nGROUP BY column_name\nORDER BY count DESC',
        filter: 'SELECT *\nFROM df\nWHERE column_name = value',
        top_n: 'SELECT *\nFROM df\nORDER BY numeric_column DESC\nLIMIT 10',
        distinct: 'SELECT DISTINCT column_name FROM df'
    };
    
    document.getElementById('sqlEditor').value = templates[template] || '';
    showToast('Template loaded', 'info');
}

async function executeQuery() {
    const sql = document.getElementById('sqlEditor').value.trim();
    
    if (!sql) {
        showToast('Please enter a SQL query', 'warning');
        return;
    }
    
    try {
        const res = await fetch('/sql/api/query', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({query: sql})
        });
        
        const data = await res.json();
        
        if (data.error) {
            showToast(data.error, 'error');
            return;
        }
        
        lastResults = data;
        
        // Display results
        displayResults(data);
        
        // Add to history
        addToHistory(sql, data.row_count);
        
        showToast(`Query executed! ${data.row_count} rows returned`, 'success');
        
    } catch (e) {
        showToast('Query execution failed', 'error');
    }
}

function displayResults(data) {
    document.getElementById('resultsCard').style.display = 'block';
    document.getElementById('resultInfo').textContent = `Query Results (${(data.execution_time * 1000).toFixed(0)}ms)`;
    document.getElementById('rowCount').textContent = `${data.row_count} rows`;
    
    if (data.rows && data.rows.length > 0) {
        const cols = Object.keys(data.rows[0]).map(k => ({
            field: k,
            sortable: true,
            filter: true,
            resizable: true,
            minWidth: 100
        }));
        
        new agGrid.Grid(document.getElementById('resultsGrid'), {
            columnDefs: cols,
            rowData: data.rows,
            defaultColDef: {sortable: true, filter: true, resizable: true}
        });
    }
}

function addToHistory(query, rowCount) {
    const timestamp = new Date().toLocaleTimeString();
    queryHistory.unshift({query, rowCount, timestamp});
    
    // Keep only last 10 queries
    if (queryHistory.length > 10) queryHistory.pop();
    
    // Update history display
    const historyHTML = queryHistory.map((item, idx) => `
        <div style="padding: 12px; border-bottom: 1px solid var(--border-subtle); cursor: pointer; transition: background 0.2s;"
             onmouseover="this.style.background='var(--bg-secondary)'" 
             onmouseout="this.style.background='transparent'"
             onclick="loadFromHistory(${idx})">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <code style="font-size: 12px; color: var(--primary-600);">${item.query.substring(0, 60)}${item.query.length > 60 ? '...' : ''}</code>
                <span class="badge badge-secondary">${item.rowCount} rows</span>
            </div>
            <div style="font-size: 11px; color: var(--text-tertiary); margin-top: 4px;">${item.timestamp}</div>
        </div>
    `).join('');
    
    document.getElementById('queryHistory').innerHTML = historyHTML;
}

function loadFromHistory(idx) {
    document.getElementById('sqlEditor').value = queryHistory[idx].query;
    showToast('Query loaded from history', 'info');
}

function visualizeResults() {
    if (!lastResults || !lastResults.rows || lastResults.rows.length === 0) {
        showToast('No results to visualize', 'warning');
        return;
    }
    
    const rows = lastResults.rows;
    const columns = Object.keys(rows[0]);
    
    // Auto-detect numeric columns for visualization
    const numericCols = columns.filter(col => typeof rows[0][col] === 'number');
    
    if (numericCols.length < 2) {
        showToast('Need at least 2 numeric columns for visualization', 'warning');
        return;
    }
    
    // Create scatter plot of first two numeric columns
    const trace = {
        x: rows.map(r => r[numericCols[0]]),
        y: rows.map(r => r[numericCols[1]]),
        mode: 'markers',
        type: 'scatter',
        marker: {
            size: 8,
            color: 'rgb(99, 102, 241)',
            opacity: 0.6
        }
    };
    
    const layout = {
        title: `${numericCols[0]} vs ${numericCols[1]}`,
        xaxis: { title: numericCols[0] },
        yaxis: { title: numericCols[1] },
        template: 'plotly_white',
        margin: { l: 60, r: 40, t: 60, b: 60 }
    };
    
    document.getElementById('vizCard').style.display = 'block';
    Plotly.newPlot('vizChart', [trace], layout, {responsive: true, displayModeBar: false});
    
    document.getElementById('vizCard').scrollIntoView({ behavior: 'smooth' });
    showToast('Visualization created!', 'success');
}

function exportResults() {
    if (!lastResults || !lastResults.rows) {
        showToast('No results to export', 'warning');
        return;
    }
    
    // Convert to CSV
    const rows = lastResults.rows;
    const headers = Object.keys(rows[0]);
    const csv = [
        headers.join(','),
        ...rows.map(row => headers.map(h => `"${row[h]}"`).join(','))
    ].join('\n');
    
    // Download
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'query_results.csv';
    a.click();
    window.URL.revokeObjectURL(url);
    
    showToast('Results exported as CSV', 'success');
}

function clearEditor() {
    document.getElementById('sqlEditor').value = '';
    document.getElementById('sqlEditor').focus();
}
</script>
{% endblock %}
