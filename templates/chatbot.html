{% extends "base.html" %}
{% block content %}
<div class="chat-container">
    <div class="alert alert-info" id="noDataAlert">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Load a dataset to start chatting with your data.
    </div>
    
    <div id="chatInterface" style="display:none;" class="animate-fade-in">
        <!-- Chat History -->
        <div class="chat-history" id="chatHistory">
            <div class="empty-state">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="bounce">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    <path d="M8 10h.01M12 10h.01M16 10h.01"/>
                </svg>
                <h3>Start a conversation</h3>
                <p>Ask questions about your data or use commands like <code>/correlate</code>, <code>/clean suggest</code>, <code>/model recommend</code></p>
            </div>
        </div>
        
        <!-- Chat Input Bar -->
        <div class="chat-input-bar">
            <select class="form-control" style="max-width: 150px;" id="modelSelect">
                <option value="openai">🤖 OpenAI</option>
                <option value="gemini">💎 Gemini</option>
            </select>
            <input type="text" class="form-control flex-grow-1" id="chatInput" placeholder="Ask about your data... (Try /commands)">
            <button class="btn btn-primary" onclick="sendMessage()" id="sendBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
                Send
            </button>
        </div>
    </div>
</div>
{% endblock %}
