<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINESE 2 - Smart Data Explorer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.0/dist/ag-grid-community.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.0/styles/ag-grid.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.0/styles/ag-theme-alpine.css">
    {% block head %}{% endblock %}
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div class="bg-dark border-end" id="sidebar-wrapper">
            <div class="sidebar-heading text-white p-3"><strong>FINESE 2</strong></div>
            <div class="list-group list-group-flush">
                <div class="p-3 text-white-50 small">DATA SOURCE</div>
                <div class="px-3 pb-3">
                    <form id="uploadForm" enctype="multipart/form-data">
                        <input type="file" name="file" id="fileInput" class="form-control form-control-sm" accept=".csv,.xlsx,.xls,.json">
                        <div class="form-text text-white-50 small">Limit 50MB</div>
                    </form>
                    <div id="uploadStatus" class="mt-2 small"></div>
                </div>
                <div class="p-3 text-white-50 small">DATASET INFO</div>
                <div class="px-3 pb-3 text-white small" id="datasetInfo"><em>No dataset loaded</em></div>
                <div class="p-3 text-white-50 small">REDUCE / SHAPE</div>
                <div class="px-3 pb-3">
                    <label class="text-white small">Limit rows (0 = no limit)</label>
                    <input type="number" class="form-control form-control-sm" id="rowLimit" value="0" min="0">
                </div>
            </div>
        </div>
        <div id="page-content-wrapper">
            <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
                <div class="container-fluid">
                    <span class="navbar-brand mb-0 h1">FINESE &middot; Smart Data Explorer Pro</span>
                    <div class="ms-auto small text-muted" id="headerMeta"></div>
                </div>
            </nav>
            <div class="container-fluid p-4">
                <ul class="nav nav-tabs mb-4" id="mainTabs">
                    <li class="nav-item"><a class="nav-link {% if active_tab == 'review' %}active{% endif %}" href="{{ url_for('review.review_page') }}">Review</a></li>
                    <li class="nav-item"><a class="nav-link {% if active_tab == 'cleaning' %}active{% endif %}" href="{{ url_for('cleaning.cleaning_page') }}">Cleaning</a></li>
                    <li class="nav-item"><a class="nav-link {% if active_tab == 'charts' %}active{% endif %}" href="{{ url_for('charts.charts_page') }}">Charts & Pivot</a></li>
                    <li class="nav-item"><a class="nav-link {% if active_tab == 'chatbot' %}active{% endif %}" href="{{ url_for('chatbot.chatbot_page') }}">Chatbot</a></li>
                    <li class="nav-item"><a class="nav-link {% if active_tab == 'ml' %}active{% endif %}" href="{{ url_for('ml.ml_page') }}">ML Studio</a></li>
                    <li class="nav-item"><a class="nav-link {% if active_tab == 'sql' %}active{% endif %}" href="{{ url_for('sql.sql_page') }}">SQL</a></li>
                    <li class="nav-item"><a class="nav-link {% if active_tab == 'export' %}active{% endif %}" href="{{ url_for('export.export_page') }}">Export</a></li>
                </ul>
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
