version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=sqlite:///instance/finese2.db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - FLASK_ENV=${FLASK_ENV:-development}
    volumes:
      - ./instance:/app/instance
      - ./models:/app/models
      - ./reports:/app/reports
      - ./dashboard/uploads:/app/dashboard/uploads
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - finese-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - finese-network

volumes:
  redis_data:

networks:
  finese-network:
    driver: bridge
