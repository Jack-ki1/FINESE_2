<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>FINESE - Single Page App</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current url and converts the path to 
      // the query string, and then redirects to the root path.
      // For example:
      // https://username.github.io/repo-name/path/in/app
      // becomes:
      // https://username.github.io/repo-name/?path=in/app
      
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.location.replace(l.pathname.slice(0, -1) + decoded);
        }
      }(window.location))
    </script>
  </head>
  <body>
  </body>
</html>
