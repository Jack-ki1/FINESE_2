[flake8]
max-line-length = 120
ignore = E203, W503
exclude = 
    .git,
    __pycache__,
    venv,
    env,
    build,
    dist
per-file-ignores =
    __init__.py: F401

[isort]
profile = black
line_length = 120
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --cov=app --cov-report=html
