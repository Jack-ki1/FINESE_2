<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINESE2 - Data Intelligence Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rajdhani:wght@500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <div class="spinner-label">Processing</div>
        <div class="spinner-sub" id="loadingMessage">Initializing...</div>
    </div>

    <!-- Toast Container (Enhanced) -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Top Navigation -->
    <nav class="top-nav">
        <div class="nav-brand" onclick="navigateTo('dashboard')">
            <div class="brand-badge">F2</div>
            <h1>FINESE<span class="accent-text">2</span></h1>
        </div>
        <div class="nav-tabs">
            <button class="nav-tab active" data-section="dashboard" onclick="navigateTo('dashboard')">
                <span class="tab-icon">📊</span> Dashboard
            </button>
            <button class="nav-tab" data-section="data" onclick="navigateTo('data')">
                <span class="tab-icon">📁</span> Data
            </button>
            <button class="nav-tab" data-section="eda" onclick="navigateTo('eda')">
                <span class="tab-icon">🔍</span> EDA
            </button>
            <button class="nav-tab" data-section="cleaning" onclick="navigateTo('cleaning')">
                <span class="tab-icon">🧹</span> Cleaning
            </button>
            <button class="nav-tab" data-section="visualization" onclick="navigateTo('visualization')">
                <span class="tab-icon">📈</span> Visualization
            </button>
            <button class="nav-tab" data-section="statistics" onclick="navigateTo('statistics')">
                <span class="tab-icon">📉</span> Statistics
            </button>
            <button class="nav-tab" data-section="modeling" onclick="navigateTo('modeling')">
                <span class="tab-icon">🤖</span> ML Models
            </button>
            <button class="nav-tab" data-section="mlops" onclick="navigateTo('mlops')">
                <span class="tab-icon">⚙️</span> MLOps
            </button>
            <button class="nav-tab" data-section="reports" onclick="navigateTo('reports')">
                <span class="tab-icon">📝</span> Reports
            </button>
            <button class="nav-tab" data-section="ai" onclick="navigateTo('ai')">
                <span class="tab-icon">💬</span> AI Assistant
            </button>
        </div>
        <div class="nav-actions">
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme (Ctrl+T)">
                <i class="fas fa-moon"></i>
            </button>
            <button class="cmd-palette-btn" onclick="showCommandPalette()" title="Command Palette (Ctrl+K)">
                <i class="fas fa-search"></i>
            </button>
            <button class="settings-btn" onclick="showAIConfig()" title="Settings">
                <i class="fas fa-cog"></i>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">

        <!-- DASHBOARD -->
        <section id="dashboard" class="section active">
            <div id="dashboard-content"></div>
        </section>

        <!-- DATA -->
        <section id="data" class="section">
            <div id="data-content"></div>
        </section>

        <!-- EDA -->
        <section id="eda" class="section">
            <div id="eda-content"></div>
        </section>

        <!-- CLEANING -->
        <section id="cleaning" class="section">
            <div id="cleaning-content"></div>
        </section>

        <!-- VISUALIZATION -->
        <section id="visualization" class="section">
            <div id="viz-content"></div>
        </section>

        <!-- STATISTICS -->
        <section id="statistics" class="section">
            <div id="statistics-content"></div>
        </section>

        <!-- ANALYSIS -->
        <section id="analysis" class="section">
            <div id="analysis-content"></div>
        </section>

        <!-- MODELING -->
        <section id="modeling" class="section">
            <div id="modeling-content"></div>
        </section>

        <!-- MLOPS -->
        <section id="mlops" class="section">
            <div id="mlops-content"></div>
        </section>

        <!-- REPORTS -->
        <section id="reports" class="section">
            <div id="reports-content"></div>
        </section>

        <!-- AI ASSISTANT -->
        <section id="ai" class="section">
            <div class="chat-container">
                <div class="card" style="padding:12px 20px;margin-bottom:12px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <span class="card-title">💬 FINESE2 AI Assistant</span>
                        <div style="display:flex;gap:8px;">
                            <button class="btn btn-secondary btn-sm" onclick="ai.clearHistory()">🗑️ Clear</button>
                            <button class="btn btn-secondary btn-sm" onclick="showAIConfig()">⚙️ Settings</button>
                        </div>
                    </div>
                </div>
                <div class="chat-messages" id="chat-messages"></div>
                <div class="chat-input-area">
                    <textarea class="chat-input" id="chat-input" placeholder="Ask me anything about data analysis, ML, or statistics..." rows="1"></textarea>
                    <button class="btn btn-primary" onclick="ai.sendMessage()">🚀 Send</button>
                </div>
            </div>
        </section>

    </main>

    <!-- AI CONFIG MODAL -->
    <div id="ai-config-modal" class="modal-overlay" style="display:none;">
        <div class="card" style="width:500px;max-width:90vw;">
            <div class="card-header">
                <span class="card-title">⚙️ AI Configuration</span>
                <button class="btn btn-secondary btn-sm" onclick="hideAIConfig()">✕</button>
            </div>
            <div class="form-group">
                <label class="form-label">Provider</label>
                <select class="form-select" id="ai-provider">
                    <option value="openai">🟢 OpenAI</option>
                    <option value="anthropic">🟣 Anthropic Claude</option>
                    <option value="google">🔵 Google Gemini</option>
                    <option value="ollama">🏠 Ollama (Local)</option>
                    <option value="groq">⚡ Groq</option>
                    <option value="mistral">🌫️ Mistral AI</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">API Key</label>
                <input type="password" class="form-input" id="ai-api-key" placeholder="sk-...">
            </div>
            <div class="form-group">
                <label class="form-label">Model</label>
                <input type="text" class="form-input" id="ai-model" placeholder="gpt-4o-mini">
            </div>
            <div style="display:flex;gap:12px;margin-top:20px;">
                <button class="btn btn-primary" onclick="saveAIConfig()">💾 Save</button>
                <button class="btn btn-secondary" onclick="ai.validate()">🔄 Test Connection</button>
            </div>
        </div>
    </div>

    <!-- ===== SCRIPTS ===== -->
    <script src="{{ url_for('static', filename='api.js') }}"></script>
    <script src="{{ url_for('static', filename='charts.js') }}"></script>
    <script src="{{ url_for('static', filename='ai.js') }}"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>

    <script>
        // AI Config Modal
        function showAIConfig() {
            document.getElementById('ai-config-modal').classList.add('open');
            document.getElementById('ai-config-modal').style.display = 'flex';
        }
        function hideAIConfig() {
            document.getElementById('ai-config-modal').classList.remove('open');
            document.getElementById('ai-config-modal').style.display = 'none';
        }
        async function saveAIConfig() {
            const config = {
                provider: document.getElementById('ai-provider').value,
                api_key: document.getElementById('ai-api-key').value,
                model: document.getElementById('ai-model').value
            };
            await ai.configure(config);
            hideAIConfig();
        }

        // Command Palette
        function showCommandPalette() {
            let palette = document.getElementById('command-palette');
            if (!palette) {
                palette = document.createElement('div');
                palette.id = 'command-palette';
                palette.className = 'modal-overlay';
                palette.innerHTML = `
                    <div class="cmd-palette">
                        <input type="text" id="cmd-input" placeholder="Type a command..." autocomplete="off">
                        <div id="cmd-results" class="cmd-results"></div>
                    </div>
                `;
                document.body.appendChild(palette);
                
                const input = document.getElementById('cmd-input');
                input.focus();
                input.addEventListener('input', filterCommands);
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') hideCommandPalette();
                    if (e.key === 'Enter') executeSelectedCommand();
                });
                
                // Populate initial commands
                populateCommands();
            }
            palette.classList.add('open');
            palette.style.display = 'flex';
        }

        function hideCommandPalette() {
            const palette = document.getElementById('command-palette');
            if (palette) {
                palette.classList.remove('open');
                palette.style.display = 'none';
            }
        }

        const commands = [
            { name: 'Go to Dashboard', icon: '📊', action: () => navigateTo('dashboard') },
            { name: 'Upload Dataset', icon: '📁', action: () => { navigateTo('data'); setTimeout(() => document.getElementById('upload-zone')?.click(), 100); } },
            { name: 'Load Sample Data', icon: '🎲', action: () => loadSampleDataset('default') },
            { name: 'Run EDA Profile', icon: '🔍', action: () => { navigateTo('eda'); setTimeout(() => loadEDATab('profile'), 100); } },
            { name: 'View Correlation', icon: '📈', action: () => { navigateTo('eda'); setTimeout(() => loadEDATab('correlation'), 100); } },
            { name: 'Train ML Models', icon: '🤖', action: () => navigateTo('modeling') },
            { name: 'Generate Report', icon: '📝', action: () => navigateTo('reports') },
            { name: 'Toggle Theme', icon: '🌙', action: toggleTheme },
            { name: 'Clear Data', icon: '🗑️', action: clearData },
            { name: 'Export as CSV', icon: '💾', action: () => api.exportData('csv') },
        ];

        function populateCommands() {
            const results = document.getElementById('cmd-results');
            results.innerHTML = commands.map((cmd, i) => `
                <div class="cmd-item" data-index="${i}" onclick="executeCommand(${i})">
                    <span class="cmd-icon">${cmd.icon}</span>
                    <span class="cmd-name">${cmd.name}</span>
                </div>
            `).join('');
        }

        function filterCommands(e) {
            const query = e.target.value.toLowerCase();
            const items = document.querySelectorAll('.cmd-item');
            items.forEach((item, i) => {
                const match = commands[i].name.toLowerCase().includes(query);
                item.style.display = match ? 'flex' : 'none';
            });
        }

        function executeCommand(index) {
            commands[index].action();
            hideCommandPalette();
        }

        function executeSelectedCommand() {
            const visible = document.querySelector('.cmd-item[style*="display: flex"]');
            if (visible) {
                const index = parseInt(visible.dataset.index);
                executeCommand(index);
            }
        }

        // Keyboard Shortcuts
        document.addEventListener('keydown', (e) => {
            // Ctrl+K for command palette
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                showCommandPalette();
            }
            // Ctrl+T for theme toggle
            if ((e.ctrlKey || e.metaKey) && e.key === 't') {
                e.preventDefault();
                toggleTheme();
            }
            // Escape to close modals
            if (e.key === 'Escape') {
                hideCommandPalette();
                hideAIConfig();
            }
        });

    </script>
</body>
</html>
